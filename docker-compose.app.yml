services:
  backend-user:
    build:
      context: .
      dockerfile: docker/backend-user.Dockerfile
    image: carenest/backend-user:${APP_VERSION:-0.1.0}
    restart: unless-stopped
    environment:
      APP_ENV: docker
      APP_VERSION: ${APP_VERSION:-0.1.0}
      BACKEND_USER_PORT: 8081
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${CARENEST_MYSQL_DATABASE:-smart_nursing}
      MYSQL_USER: ${CARENEST_MYSQL_USER:-smart_nursing}
      MYSQL_PASSWORD: ${CARENEST_MYSQL_PASSWORD:-smart_nursing123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-smart-nursing}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      JWT_SECRET: ${JWT_SECRET:-smart-nursing-local-secret}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${BACKEND_USER_PORT:-8081}:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/api/v1/health | grep -q '\"dbConnected\":true'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  backend-care-admin:
    build:
      context: .
      dockerfile: docker/backend-care-admin.Dockerfile
    image: carenest/backend-care-admin:${APP_VERSION:-0.1.0}
    restart: unless-stopped
    environment:
      APP_ENV: docker
      APP_VERSION: ${APP_VERSION:-0.1.0}
      BACKEND_CARE_ADMIN_PORT: 8082
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${CARENEST_MYSQL_DATABASE:-smart_nursing}
      MYSQL_USER: ${CARENEST_MYSQL_USER:-smart_nursing}
      MYSQL_PASSWORD: ${CARENEST_MYSQL_PASSWORD:-smart_nursing123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-smart-nursing}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      JWT_SECRET: ${JWT_SECRET:-smart-nursing-local-secret}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${BACKEND_CARE_ADMIN_PORT:-8082}:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/api/v1/health | grep -q '\"dbConnected\":true'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_FRONTEND_API_BASE: /api/v1
    image: carenest/frontend:${APP_VERSION:-0.1.0}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    depends_on:
      backend-user:
        condition: service_healthy
      backend-care-admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/nginx-health | grep -qx ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    security_opt:
      - no-new-privileges:true
