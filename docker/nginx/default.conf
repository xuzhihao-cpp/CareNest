server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    client_max_body_size 20m;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_user http://backend-user:8081;
    set $backend_care_admin http://backend-care-admin:8082;

    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    location = /api/v1/health {
        proxy_pass $backend_user;
        include /etc/nginx/proxy-headers.conf;
    }

    location = /api/v1/version {
        proxy_pass $backend_user;
        include /etc/nginx/proxy-headers.conf;
    }

    location ~ ^/api/v1/(auth|elders|service-addresses|reminders|ai|assistance|files)(/|$) {
        proxy_pass $backend_user;
        include /etc/nginx/proxy-headers.conf;
        proxy_read_timeout 60s;
    }

    location ~ ^/api/v1/elder/(bindings|reports|home-summary|health-feedback)(/|$) {
        proxy_pass $backend_user;
        include /etc/nginx/proxy-headers.conf;
        proxy_read_timeout 60s;
    }

    location ~ ^/api/v1/family/(bindings|elders|reports|home-summary)(/|$) {
        proxy_pass $backend_user;
        include /etc/nginx/proxy-headers.conf;
        proxy_read_timeout 60s;
    }

    location ~ ^/api/v1/admin/roles(/|$) {
        proxy_pass $backend_user;
        include /etc/nginx/proxy-headers.conf;
        proxy_read_timeout 60s;
    }

    location /api/v1/ {
        proxy_pass $backend_care_admin;
        include /etc/nginx/proxy-headers.conf;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
