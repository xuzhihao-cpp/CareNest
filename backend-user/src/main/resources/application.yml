server:
  port: ${BACKEND_USER_PORT:8081}

spring:
  application:
    name: carenest-backend-user
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 2s
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:smart_nursing}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:smart_nursing}
    password: ${MYSQL_PASSWORD:smart_nursing123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 21MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

carenest:
  app:
    version: ${APP_VERSION:0.1.0}
  jwt:
    secret: ${JWT_SECRET:smart-nursing-local-secret}
    expire-hours: ${JWT_EXPIRE_HOURS:24}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:smart-nursing}
    region: ${MINIO_REGION:us-east-1}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
