spring:
  datasource:
    url: jdbc:h2:mem:carenest_user_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema.sql
      data-locations: classpath:test-data.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

carenest:
  jwt:
    secret: smart-nursing-local-secret
    expire-hours: 24
