name: carenest

services:
  mysql:
    image: mysql:8.0
    container_name: carenest-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${CARENEST_MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${CARENEST_MYSQL_DATABASE:-smart_nursing}
      MYSQL_USER: ${CARENEST_MYSQL_USER:-smart_nursing}
      MYSQL_PASSWORD: ${CARENEST_MYSQL_PASSWORD:-smart_nursing123}
      TZ: Asia/Shanghai
    ports:
      - "${CARENEST_MYSQL_PORT:-3306}:3306"
    volumes:
      - carenest_mysql_data:/var/lib/mysql
      - ./docker/mysql/00-run-project-sql.sh:/docker-entrypoint-initdb.d/00-run-project-sql.sh:ro
      - ./db/schema:/docker-entrypoint-initdb.d/schema:ro
      - ./db/seed:/docker-entrypoint-initdb.d/seed:ro
      - ./db/migration:/opt/carenest/migration:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: carenest-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD}" ]; then
          exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - carenest_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" --no-auth-warning ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: carenest-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
      TZ: Asia/Shanghai
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - carenest_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-smart-nursing}
    volumes:
      - ./db/seed/assets:/seed-assets:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mc alias set local http://minio:9000 "$${MINIO_ACCESS_KEY}" "$${MINIO_SECRET_KEY}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        mc cp /seed-assets/blood-pressure-report.pdf "local/$${MINIO_BUCKET}/demo/elder_001/blood-pressure-report.pdf"
        mc cp /seed-assets/lab-result.pdf "local/$${MINIO_BUCKET}/demo/elder_001/lab-result.pdf"
        mc cp /seed-assets/blood-pressure-report.pdf "local/$${MINIO_BUCKET}/demo/nurse/pending/certificate.pdf"
        mc cp /seed-assets/blood-pressure-report.pdf "local/$${MINIO_BUCKET}/demo/nurse/needmore/certificate.pdf"
        mc cp /seed-assets/blood-pressure-report.pdf "local/$${MINIO_BUCKET}/demo/nurse/qualified/certificate.pdf"
        mc cp /seed-assets/blood-pressure-report.pdf "local/$${MINIO_BUCKET}/demo/nurse/valid/certificate.pdf"
        mc cp /seed-assets/blood-pressure-report.pdf "local/$${MINIO_BUCKET}/demo/nurse/expired/certificate.pdf"
        mc cp /seed-assets/blood-pressure-report.pdf "local/$${MINIO_BUCKET}/demo/nurse/reco-a/certificate.pdf"
        mc cp /seed-assets/blood-pressure-report.pdf "local/$${MINIO_BUCKET}/demo/nurse/reco-b/certificate.pdf"

volumes:
  carenest_mysql_data:
  carenest_redis_data:
  carenest_minio_data:
