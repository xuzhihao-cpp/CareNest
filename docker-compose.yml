name: carenest

services:
  mysql:
    image: mysql:8.4
    container_name: carenest-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-carenest}
      MYSQL_USER: ${MYSQL_USER:-carenest}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-carenest_dev_password}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - carenest_mysql_data:/var/lib/mysql
      - ./db/schema:/docker-entrypoint-initdb.d/schema:ro
      - ./db/seed:/docker-entrypoint-initdb.d/seed:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: carenest-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - carenest_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: carenest-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-carenest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-carenest_minio_password}
      TZ: Asia/Shanghai
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - carenest_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  carenest_mysql_data:
  carenest_redis_data:
  carenest_minio_data: